security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email        # ✅ IMPORTANT
                password_parameter: password     # ✅ IMPORTANT
                csrf_token_id: authenticate

            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/property/new, roles: ROLE_ADMIN }
        - { path: ^/property/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/staff, roles: ROLE_ADMIN }

        - { path: ^/reservation, roles: ROLE_USER }
        - { path: ^/payment, roles: ROLE_USER }
